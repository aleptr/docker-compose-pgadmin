services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_server
    env_file:
      - .env
    ports:
      - '${PGADMIN_PORT}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - my-data:/var/lib/pgadmin

volumes:
  my-data: